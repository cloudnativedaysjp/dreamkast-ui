name: build container image when tags are pushed

on:
  push:
    tags: ["*"]

jobs:
  build:
    uses: cloudnativedaysjp/reusable-workflows/.github/workflows/wc-build-image.yml@main
    permissions:
      contents: read
      id-token: write
    with:
      image_name: dreamkast-ui
      platforms: amd64
      aws_region: ap-northeast-1
      run-trivy: false
      build_args: |
        SENTRY_RELEASE=${{ github.ref_name }}

  upload-sourcemaps:
    needs: build  # to use build cache
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build
        id: docker_build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./
          file: Dockerfile-upload-source-maps
          builder: ${{ steps.buildx.outputs.name }}
          push: false
          cache-from: type=gha
          build-args: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_RELEASE=${{ github.ref_name }}
